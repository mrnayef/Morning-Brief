
<style>
  .briefing-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
  .briefing-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .briefing-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
  .briefing-subtitle { font-size: 13px; color: var(--color-text-secondary); margin: 4px 0 0; }
  .run-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: var(--border-radius-md); background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); font-size: 14px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; transition: background 0.15s; }
  .run-btn:hover { background: var(--color-background-secondary); }
  .run-btn:active { transform: scale(0.98); }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .sleep-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding: 12px 16px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); }
  .sleep-label { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
  .sleep-row select { font-size: 13px; padding: 4px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  .section { margin-bottom: 1.5rem; }
  .section-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 8px; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .item-row:last-child { border-bottom: none; padding-bottom: 0; }
  .item-icon { font-size: 16px; color: var(--color-text-secondary); margin-top: 2px; flex-shrink: 0; }
  .item-main { flex: 1; min-width: 0; }
  .item-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 4px; }
  .item-summary { font-size: 13px; color: var(--color-text-secondary); margin: 0; line-height: 1.5; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .badge-urgent { background: #FCEBEB; color: #A32D2D; }
  .badge-info { background: #E6F1FB; color: #185FA5; }
  .badge-neutral { background: #F1EFE8; color: #5F5E5A; }
  .cal-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .cal-item:last-child { border-bottom: none; padding-bottom: 0; }
  .cal-time { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); min-width: 72px; }
  .cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cal-name { font-size: 14px; color: var(--color-text-primary); }
  .cal-guests { font-size: 12px; color: var(--color-text-secondary); }
  .loading-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 2rem; text-align: center; }
  .loading-dots { font-size: 13px; color: var(--color-text-secondary); }
  .empty-state { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
  .summary-bar { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 16px; margin-bottom: 1.5rem; font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; }
  .err { color: var(--color-text-danger, #a32d2d); font-size: 13px; padding: 8px 0; }
</style>

<div class="briefing-wrap">
  <h2 class="sr-only">Morning briefing: summarizes overnight emails, Slack messages, and today's calendar events</h2>
  <div class="briefing-header">
    <div>
      <p class="briefing-title"><i class="ti ti-coffee" aria-hidden="true" style="font-size:20px; vertical-align:-2px; margin-right:8px;"></i>Morning briefing</p>
      <p class="briefing-subtitle" id="date-label">Loading...</p>
    </div>
    <button class="run-btn" id="run-btn" onclick="runBriefing()">
      <i class="ti ti-refresh" aria-hidden="true"></i> Run briefing
    </button>
  </div>

  <div class="sleep-row">
    <span class="sleep-label"><i class="ti ti-moon" aria-hidden="true" style="vertical-align:-2px; margin-right:4px;"></i>Sleep window:</span>
    <select id="sleep-start"><option value="20">8:00 PM</option><option value="21">9:00 PM</option><option value="22" selected>10:00 PM</option><option value="23">11:00 PM</option><option value="0">Midnight</option></select>
    <span class="sleep-label">to</span>
    <select id="sleep-end"><option value="5">5:00 AM</option><option value="6">6:00 AM</option><option value="6.75" selected>6:45 AM</option><option value="7">7:00 AM</option><option value="8">8:00 AM</option></select>
    <span class="sleep-label" style="margin-left:auto; font-size:11px;">ET</span>
  </div>

  <div id="output"></div>
</div>

<script>
const now = new Date();
document.getElementById('date-label').textContent =
  now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

function getSleepWindow() {
  const startH = parseFloat(document.getElementById('sleep-start').value);
  const endH = parseFloat(document.getElementById('sleep-end').value);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);

  const sleepStart = new Date(yesterday);
  sleepStart.setHours(Math.floor(startH), (startH % 1) * 60, 0, 0);

  const wakeEnd = new Date(today);
  wakeEnd.setHours(Math.floor(endH), (endH % 1) * 60, 0, 0);

  return { sleepStart, wakeEnd };
}

function fmtTime(dt) {
  return dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}
function fmtDateRange(start, end) {
  return `${fmtTime(new Date(start))} – ${fmtTime(new Date(end))}`;
}

function setLoading(sections) {
  document.getElementById('output').innerHTML = sections.map(s => `
    <div class="section">
      <div class="section-head"><i class="ti ti-${s.icon}" aria-hidden="true"></i>${s.label}</div>
      <div class="loading-card"><p class="loading-dots">Fetching...</p></div>
    </div>`).join('');
}

function renderOutput(emails, slacks, events, aiSummary, sleepStart, wakeEnd) {
  const out = document.getElementById('output');
  let html = '';

  if (aiSummary) {
    html += `<div class="summary-bar"><strong style="color:var(--color-text-primary)"><i class="ti ti-sparkles" aria-hidden="true" style="vertical-align:-2px; margin-right:4px;"></i>AI summary</strong><br>${aiSummary}</div>`;
  }

  html += `<div class="section"><div class="section-head"><i class="ti ti-mail" aria-hidden="true"></i>Emails (${emails.length})</div>`;
  if (!emails.length) {
    html += `<div class="card"><p class="empty-state">No emails while you slept.</p></div>`;
  } else {
    html += `<div class="card">`;
    emails.forEach(e => {
      const urgent = /urgent|action required|asap|important|critical/i.test((e.subject||'')+(e.snippet||''));
      html += `<div class="item-row">
        <i class="ti ti-mail item-icon" aria-hidden="true"></i>
        <div class="item-main">
          <p class="item-title">${escHtml(e.subject || '(no subject)')}</p>
          <p class="item-meta">From: ${escHtml(e.from||'Unknown')}</p>
          <p class="item-summary">${escHtml((e.snippet||'').slice(0,120))}${e.snippet && e.snippet.length > 120 ? '…' : ''}</p>
        </div>
        ${urgent ? '<span class="badge badge-urgent">Urgent</span>' : ''}
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  html += `<div class="section"><div class="section-head"><i class="ti ti-brand-slack" aria-hidden="true"></i>Slack messages (${slacks.length})</div>`;
  if (!slacks.length) {
    html += `<div class="card"><p class="empty-state">No Slack messages while you slept.</p></div>`;
  } else {
    html += `<div class="card">`;
    slacks.forEach(s => {
      html += `<div class="item-row">
        <i class="ti ti-message item-icon" aria-hidden="true"></i>
        <div class="item-main">
          <p class="item-title">#${escHtml(s.channel||'direct')}</p>
          <p class="item-meta">${escHtml(s.user||'Someone')}</p>
          <p class="item-summary">${escHtml((s.text||'').slice(0,120))}${s.text && s.text.length > 120 ? '…' : ''}</p>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
  html += `<div class="section"><div class="section-head"><i class="ti ti-calendar" aria-hidden="true"></i>Today's calendar (${events.length} events)</div>`;
  if (!events.length) {
    html += `<div class="card"><p class="empty-state">No events today.</p></div>`;
  } else {
    const colors = ['#378ADD','#1D9E75','#BA7517','#D85A30','#D4537E','#7F77DD'];
    html += `<div class="card">`;
    events.forEach((ev, i) => {
      const start = ev.start?.dateTime || ev.start?.date;
      const end = ev.end?.dateTime || ev.end?.date;
      const timeStr = start ? fmtDateRange(start, end || start) : 'All day';
      const guestCount = (ev.attendees||[]).length;
      html += `<div class="cal-item">
        <span class="cal-time">${timeStr}</span>
        <span class="cal-dot" style="background:${colors[i % colors.length]}"></span>
        <div>
          <p class="cal-name">${escHtml(ev.summary||'Untitled')}</p>
          ${guestCount > 1 ? `<p class="cal-guests">${guestCount} attendees</p>` : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  out.innerHTML = html;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  return data.content?.map(b => b.text||'').join('') || '';
}

async function runBriefing() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" aria-hidden="true"></i> Running…';

  const { sleepStart, wakeEnd } = getSleepWindow();
  setLoading([
    { icon: 'mail', label: 'Emails' },
    { icon: 'brand-slack', label: 'Slack messages' },
    { icon: 'calendar', label: "Today's calendar" }
  ]);

  const afterDate = sleepStart.toISOString().slice(0,10).replace(/-/g,'/');
  const afterTs = Math.floor(sleepStart.getTime()/1000).toString();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);

  let emails = [], slacks = [], events = [], errs = [];

  try {
    sendPrompt(`__briefing_fetch__:${JSON.stringify({
      sleepStartISO: sleepStart.toISOString(),
      wakeEndISO: wakeEnd.toISOString(),
      afterDate,
      afterTs,
      todayStartISO: todayStart.toISOString(),
      todayEndISO: todayEnd.toISOString()
    })}`);
  } catch(e) {
    errs.push('Could not initiate data fetch: ' + e.message);
  }

  document.getElementById('output').innerHTML = `<div class="summary-bar" style="text-align:center;">
    <i class="ti ti-loader" aria-hidden="true" style="font-size:20px; vertical-align:-2px; margin-right:8px;"></i>
    Fetching your emails, Slack messages, and calendar — Claude will assemble your briefing momentarily.
  </div>`;

  btn.disabled = false; btn.innerHTML = '<i class="ti ti-refresh" aria-hidden="true"></i> Run briefing';
}

</script>

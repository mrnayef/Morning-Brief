<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --muted: #7a7870;
    --accent: #e8c97a;
    --accent-dim: rgba(232,201,122,0.12);
    --accent-glow: rgba(232,201,122,0.25);
    --red: #e87a7a;
    --green: #7ae8b0;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  /* Radial glow behind content */
  .page::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(232,201,122,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 0.5px solid var(--border-bright);
    border-radius: 20px;
    padding: 2.5rem 2.5rem 2rem;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  /* Sleep window config */
  .config {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.75rem;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .config-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 2px;
  }

  .config select {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    outline: none;
    padding: 0 2px;
    -webkit-appearance: none;
    appearance: none;
  }

  .config select option {
    background: #1e2026;
    color: var(--text);
  }

  .divider-dot { color: var(--border-bright); }

  /* Run button */
  .run-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #1a1500;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .run-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .run-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow); }
  .run-btn:hover::before { background: rgba(255,255,255,0.08); }
  .run-btn:active { transform: scale(0.99); }

  .btn-icon { font-size: 16px; }

  /* Date + time display */
  .datetime {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 1.75rem;
    padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border);
  }

  .day-name { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .date-full { font-size: 18px; font-weight: 400; color: var(--text); }
  .time-now {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-style: italic;
    color: var(--accent);
    line-height: 1;
  }

  /* Streak / last run info */
  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.25rem;
    font-size: 11px;
    color: var(--muted);
  }

  .streak { display: flex; align-items: center; gap: 5px; }
  .streak-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }

  /* Pills row */
  .pills {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--border-bright);
    color: var(--muted);
    background: rgba(255,255,255,0.03);
  }

  .pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="eyebrow">Daily briefing</div>

    <div class="datetime">
      <div>
        <div class="day-name" id="day-name">Thursday</div>
        <div class="date-full" id="date-full">June 4, 2026</div>
      </div>
      <div class="time-now" id="time-now">6:45</div>
    </div>

    <h1>Good <em id="greeting-word">morning</em>,<br>Nayef.</h1>
    <p class="subtitle">Click below to open a fresh briefing in Claude — your emails, Slacks, and calendar from overnight, summarized.</p>

    <div class="pills">
      <span class="pill active">Gmail</span>
      <span class="pill active">Slack</span>
      <span class="pill active">Calendar</span>
    </div>

    <div class="config">
      <span class="config-label">Sleep</span>
      <select id="sleep-start">
        <option value="20">8 PM</option>
        <option value="21">9 PM</option>
        <option value="22" selected>10 PM</option>
        <option value="23">11 PM</option>
        <option value="0">Midnight</option>
      </select>
      <span class="divider-dot">→</span>
      <select id="sleep-end">
        <option value="5">5 AM</option>
        <option value="6">6 AM</option>
        <option value="6.75" selected>6:45 AM</option>
        <option value="7">7 AM</option>
        <option value="8">8 AM</option>
      </select>
      <span style="margin-left:auto; font-size:10px; letter-spacing:0.08em; text-transform:uppercase;">ET</span>
    </div>

    <button class="run-btn" onclick="openBriefing()">
      <span class="btn-icon">☀</span>
      Open today's briefing
    </button>

    <div class="footer-row">
      <div class="streak"><span class="streak-dot"></span> Connected: Gmail · Slack · Calendar</div>
      <div id="last-run">Ready</div>
    </div>
  </div>
</div>

<script>
  function pad(n) { return String(n).padStart(2, '0'); }

  function updateClock() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    document.getElementById('time-now').textContent = `${h % 12 || 12}:${pad(m)}`;
    document.getElementById('day-name').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
    document.getElementById('date-full').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    const word = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
    document.getElementById('greeting-word').textContent = word;
  }

  updateClock();
  setInterval(updateClock, 30000);

  function openBriefing() {
    const startH = parseFloat(document.getElementById('sleep-start').value);
    const endH = parseFloat(document.getElementById('sleep-end').value);
    const today = new Date();
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);

    const sleepStart = new Date(yesterday);
    sleepStart.setHours(Math.floor(startH), (startH % 1) * 60, 0, 0);

    const wakeEnd = new Date(today);
    wakeEnd.setHours(Math.floor(endH), (endH % 1) * 60, 0, 0);

    const afterDate = `${sleepStart.getFullYear()}/${pad(sleepStart.getMonth()+1)}/${pad(sleepStart.getDate())}`;
    const afterTs = Math.floor(sleepStart.getTime() / 1000).toString();
    const todayStart = new Date(today); todayStart.setHours(0,0,0,0);
    const todayEnd = new Date(today); todayEnd.setHours(23,59,59,999);

    const payload = JSON.stringify({
      sleepStartISO: sleepStart.toISOString(),
      wakeEndISO: wakeEnd.toISOString(),
      afterDate,
      afterTs,
      todayStartISO: todayStart.toISOString(),
      todayEndISO: todayEnd.toISOString()
    });

    const prompt = `__briefing_fetch__:${payload}`;
    const url = `https://claude.ai/new?q=${encodeURIComponent(prompt)}`;

    document.getElementById('last-run').textContent = `Opened ${new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;
    window.location.href = url;
  }
</script>
</body>
</html>
